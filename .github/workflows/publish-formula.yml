name: publish formula

on:
  workflow_call:
    inputs:
      formula:
        required: true
        type: string
      repository:
        required: false
        type: string
        default: ""
      ref:
        required: false
        type: string
        default: ""
      version:
        required: false
        type: string
        default: ""
      spec-path:
        required: false
        type: string
        default: ".github/homebrew/formula.yml"
      dry-run:
        required: false
        type: boolean
        default: false
      tap-branch:
        required: false
        type: string
        default: "main"
      tap-repository:
        required: false
        type: string
        default: "connextable/homebrew-tap"
      tap-ref:
        required: false
        type: string
        default: "main"
    secrets:
      token:
        required: false
      deploy_key:
        required: false

jobs:
  publish-formula:
    name: Publish Homebrew formula
    runs-on: macos-latest
    concurrency:
      group: formula-${{ github.repository }}-${{ inputs.formula }}
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: select credential
        id: credential
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "mode=dry_run" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$TOKEN" ] && [ -n "$DEPLOY_KEY" ]; then
            echo "::error::Provide either token or deploy_key, not both."
            exit 1
          fi
          if [ -n "$DEPLOY_KEY" ]; then
            echo "mode=deploy_key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::Provide token or deploy_key to publish the formula."
          exit 1
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          TOKEN: ${{ secrets.token }}
          DEPLOY_KEY: ${{ secrets.deploy_key }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.credential.outputs.mode == 'token'
        with:
          repository: ${{ inputs.tap-repository }}
          ref: ${{ inputs.tap-ref }}
          token: ${{ secrets.token }}
          path: tap
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.credential.outputs.mode == 'deploy_key'
        with:
          repository: ${{ inputs.tap-repository }}
          ref: ${{ inputs.tap-ref }}
          ssh-key: ${{ secrets.deploy_key }}
          path: tap
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.credential.outputs.mode == 'dry_run'
        with:
          repository: ${{ inputs.tap-repository }}
          ref: ${{ inputs.tap-ref }}
          path: tap
          fetch-depth: 0
          persist-credentials: false
      - name: prepare tap branch
        working-directory: tap
        env:
          TAP_BRANCH: ${{ inputs.tap-branch }}
        run: |
          set -euo pipefail
          git check-ref-format --branch "$TAP_BRANCH" >/dev/null
          git fetch origin "$TAP_BRANCH"
          git switch --force-create "$TAP_BRANCH" "origin/$TAP_BRANCH"
      - name: resolve source inputs
        id: source
        run: bash tap/.github/workflows/scripts/resolve-source-inputs.sh
        env:
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.ref }}
          path: source
          fetch-depth: 0
          persist-credentials: false
      - name: generate formula
        id: formula
        uses: ./tap/actions/publish/formula
        with:
          tap-path: tap
          source-path: source
          formula: ${{ inputs.formula }}
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.ref }}
          version: ${{ inputs.version }}
          spec-path: ${{ inputs.spec-path }}
      - name: validate formula
        env:
          FORMULA: ${{ inputs.formula }}
        run: |
          set -euo pipefail
          validation_root="$(mktemp -d)"
          validation_tap="$validation_root/homebrew-validation"
          cp -R tap "$validation_tap"
          rm -rf "$validation_tap/.git"
          git init --initial-branch=main "$validation_tap"
          git -C "$validation_tap" config user.name "github-actions[bot]"
          git -C "$validation_tap" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$validation_tap" add -A
          git -C "$validation_tap" commit -m "test: validate $FORMULA" >/dev/null
          brew tap connextable/validation "$validation_tap"
          qualified_formula="connextable/validation/$FORMULA"
          brew audit --strict --formula "$qualified_formula"
          HOMEBREW_NO_INSTALL_FROM_API=1 brew install --build-from-source "$qualified_formula"
          brew test "$qualified_formula"
      - name: commit formula
        if: ${{ !inputs.dry-run }}
        id: commit_formula
        working-directory: tap
        run: bash .github/workflows/scripts/commit-formula.sh
        env:
          FORMULA_PATH: ${{ steps.formula.outputs.formula-path }}
          FORMULA: ${{ inputs.formula }}
          VERSION: ${{ steps.formula.outputs.version }}
      - name: push formula
        if: ${{ !inputs.dry-run && steps.commit_formula.outputs.changed == 'true' }}
        working-directory: tap
        run: bash .github/workflows/scripts/push-formula.sh
        env:
          TAP_BRANCH: ${{ inputs.tap-branch }}
